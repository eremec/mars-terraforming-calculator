<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="ТМ счётчик">
<meta name="application-name" content="ТМ счётчик">
<meta name="theme-color" content="#1a1210">
<link rel="manifest" href="manifest.webmanifest">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png">
<link rel="icon" type="image/png" sizes="512x512" href="icon-512.png">
<title>Терраформирование Марса — счётчик</title>
<style>
:root{
  --bg:#1a1210; --panel:#241814; --panel2:#2c1e18; --line:#3a2820;
  --text:#f3e9e2; --muted:#b79b8c; --accent:#e2683b; --bad:#e05a4a;
}
*{box-sizing:border-box}
html,body{margin:0}
body{
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
  background:radial-gradient(circle at 50% -15%,#43200f,#1a1210 60%);
  color:var(--text);-webkit-tap-highlight-color:transparent;min-height:100vh;
}
.wrap{max-width:520px;margin:0 auto;padding:10px 10px calc(84px + env(safe-area-inset-bottom))}

input[type=number]{-moz-appearance:textfield}
input[type=number]::-webkit-inner-spin-button,
input[type=number]::-webkit-outer-spin-button{-webkit-appearance:none;margin:0}
.val{outline:none;border:1px solid var(--line);background:#160f0c;color:var(--text);
  text-align:center;font-weight:700;border-radius:9px}
.val:focus{border-color:var(--accent)}
.sb{border:1px solid var(--line);background:var(--panel2);color:var(--text);border-radius:9px;
  line-height:1;font-weight:600;user-select:none;touch-action:manipulation;display:grid;place-items:center}
.sb:active{filter:brightness(1.3)}

/* ---- top bar ---- */
.topbar{display:flex;align-items:center;gap:8px;margin-bottom:10px}
.spacer{flex:1 1 auto}
.trbox{display:flex;align-items:center;gap:3px;background:linear-gradient(135deg,#8a3318,#bd4d2b);
  border-radius:11px;padding:3px 5px;box-shadow:0 3px 10px rgba(0,0,0,.4)}
.trbox .lab{font-size:12px;font-weight:800;opacity:.95;padding:0 3px}
.trbox .sb{height:34px;min-width:30px;background:rgba(0,0,0,.18);border:none;color:#fff;font-size:21px}
.trbox .val{height:34px;width:40px;background:rgba(0,0,0,.22);border:none;color:#fff;font-size:18px}
.gen{font-size:13px;color:var(--muted);white-space:nowrap}
.gen b{color:var(--text);font-weight:700;font-size:15px}
.menu-btn{flex:0 0 auto;width:38px;height:38px;border-radius:10px;border:1px solid var(--line);
  background:var(--panel);color:var(--muted);font-size:18px}

/* ---- resource card ---- */
.res{background:var(--panel);border:1px solid var(--line);border-left:4px solid var(--c);
  border-radius:13px;padding:8px 10px;margin-bottom:8px}
.rhead{display:flex;align-items:center;gap:8px;margin-bottom:7px}
.ic{flex:1 1 auto;font-size:22px;line-height:1}
.conv{flex:0 0 auto;width:38px;height:32px;border-radius:8px;border:1px dashed var(--line);
  background:transparent;font-size:17px;color:var(--text)}
.conv:not(:disabled):active{background:color-mix(in srgb,var(--c) 26%,transparent)}
.conv:disabled{opacity:.28}
.conv.empty{display:none}

.prodbox{display:flex;align-items:center;gap:6px;flex:0 0 auto}
.plabel{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.3px}
.grp.prod{display:flex;align-items:center;gap:4px}
.grp.prod .sb{width:32px;height:32px;font-size:18px}
.grp.prod .val{width:42px;height:32px;font-size:16px}

/* stock stepper row: −10 −5 −1 [value] +1 +5 +10 */
.grp.stock{display:flex;align-items:stretch;gap:4px}
.grp.stock .sb{flex:1 1 0;min-width:0;height:46px;font-size:14px}
.grp.stock .sb.one{flex:1.15 1 0;font-size:20px;font-weight:800;
  background:color-mix(in srgb,var(--c) 18%,var(--panel2));
  border-color:color-mix(in srgb,var(--c) 42%,var(--line))}
.grp.stock .val.big{flex:1.8 1 0;min-width:0;height:46px;font-size:23px;font-weight:800;color:var(--c)}

/* ---- bottom bar ---- */
.bar{position:fixed;left:0;right:0;bottom:0;max-width:520px;margin:0 auto;
  background:linear-gradient(180deg,rgba(26,18,16,0),#1a1210 26%);
  padding:10px 10px calc(10px + env(safe-area-inset-bottom));display:flex;gap:8px}
.produce{flex:1;height:52px;border:none;border-radius:13px;color:#fff;font-weight:700;
  background:linear-gradient(135deg,#1f7a3d,#2ea353);box-shadow:0 6px 16px rgba(0,0,0,.5);
  display:flex;align-items:center;justify-content:center;gap:10px;font-size:16px}
.produce .pprev{font-size:13px;font-weight:600;background:rgba(0,0,0,.22);padding:3px 9px;border-radius:8px}
.produce:active{filter:brightness(1.12)}
.undo{flex:0 0 auto;width:52px;height:52px;border-radius:13px;border:1px solid var(--line);
  background:var(--panel);color:var(--text);font-size:22px}
.undo[hidden]{display:none}

.toast{position:fixed;left:50%;bottom:84px;transform:translateX(-50%) translateY(20px);
  background:#102a16;border:1px solid #2ea353;color:#dff5e3;padding:9px 14px;border-radius:11px;
  font-size:13px;max-width:92vw;text-align:center;opacity:0;transition:.22s;pointer-events:none;z-index:5}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

.sheet{position:fixed;inset:0;background:rgba(0,0,0,.55);display:none;align-items:flex-end;z-index:10}
.sheet.show{display:flex}
.sheet .inner{background:var(--panel);width:100%;max-width:520px;margin:0 auto;border-radius:18px 18px 0 0;
  padding:16px 16px calc(16px + env(safe-area-inset-bottom))}
.sheet h3{margin:2px 0 12px}
.sheet button{width:100%;height:48px;border-radius:12px;border:1px solid var(--line);background:var(--panel2);
  color:var(--text);font-size:15px;margin-top:8px}
.sheet button.danger{color:var(--bad);border-color:#5a2a24}
.sheet button.close{background:transparent;color:var(--muted)}
</style>
</head>
<body>
<div class="wrap">
  <div class="topbar">
    <div class="trbox">
      <span class="lab">TR</span>
      <button class="sb" data-tr="-1">−</button>
      <input class="val" id="trVal" type="number" inputmode="numeric">
      <button class="sb" data-tr="1">+</button>
    </div>
    <span class="spacer"></span>
    <div class="gen">Поколение <b id="gen">1</b></div>
    <button class="menu-btn" id="menuBtn">⚙</button>
  </div>

  <div id="rows"></div>
</div>

<div class="bar">
  <button class="produce" id="produceBtn">
    <span>⚙ Производство</span><span class="pprev" id="prevText"></span>
  </button>
  <button class="undo" id="undoBtn" hidden title="Отменить производство">↩</button>
</div>

<div class="toast" id="toast"></div>

<div class="sheet" id="sheet">
  <div class="inner">
    <h3>Меню</h3>
    <button id="prodSummaryBtn">Что начислит производство?</button>
    <button class="danger" id="newGameBtn">Новая игра (сброс)</button>
    <button class="close" id="closeSheet">Закрыть</button>
  </div>
</div>

<script>
"use strict";
const RES = [
  {key:"mc",       name:"Кредиты",  icon:"💰", color:"#f1c40f", minProd:-5},
  {key:"steel",    name:"Сталь",    icon:"🔨", color:"#c87f3a", minProd:0},
  {key:"titanium", name:"Титан",    icon:"⭐", color:"#9aa4ad", minProd:0},
  {key:"plants",   name:"Растения", icon:"🌱", color:"#4caf50", minProd:0, convert:{cost:8, icon:"🌳", title:"8 растений → озеленение (+1 TR)"}},
  {key:"energy",   name:"Энергия",  icon:"⚡", color:"#9b59b6", minProd:0},
  {key:"heat",     name:"Тепло",    icon:"🔥", color:"#e74c3c", minProd:0, convert:{cost:8, icon:"🌡️", title:"8 тепла → нагрев (+1 TR)"}},
];
const KEY = "tm-tracker-v1";
const STOCK_STEPS = [-10, -5, -1, "val", 1, 5, 10];
const ICONS = {};
RES.forEach(r => ICONS[r.key] = r.icon);

function defaultState(){
  const res = {};
  RES.forEach(r => res[r.key] = {prod:0, stock:0});
  return {tr:20, gen:1, res};
}
let state = load();
let lastSnapshot = null;

function load(){
  try{
    const s = JSON.parse(localStorage.getItem(KEY));
    if(s && s.res && typeof s.tr === "number") return s;
  }catch(e){}
  return defaultState();
}
function save(){ try{ localStorage.setItem(KEY, JSON.stringify(state)); }catch(e){} }

function adjust(key, field, delta){
  state.res[key][field] = clampVal(key, field, state.res[key][field] + delta);
  update(); save();
}
function clampVal(key, field, v){
  if(isNaN(v)) v = 0;
  v = Math.round(v);
  if(field === "prod") return Math.max(RES.find(x => x.key === key).minProd, v);
  return Math.max(0, v);
}

// ---- build cards ----
const rowsEl = document.getElementById("rows");
const refs = {};
RES.forEach(r => {
  const stockBtns = STOCK_STEPS.map(s =>
    s === "val"
      ? `<input class="val big" type="number" inputmode="numeric">`
      : `<button class="sb${Math.abs(s)===1?" one":""}" data-d="${s}">${s>0?"+":"−"}${Math.abs(s)}</button>`
  ).join("");

  const card = document.createElement("div");
  card.className = "res";
  card.style.setProperty("--c", r.color);
  card.title = r.name;
  card.innerHTML = `
    <div class="rhead">
      <span class="ic">${r.icon}</span>
      ${r.convert
        ? `<button class="conv" title="${r.convert.title}">${r.convert.icon}</button>`
        : `<button class="conv empty" disabled></button>`}
      <div class="prodbox">
        <span class="plabel">Произв.</span>
        <div class="grp prod">
          <button class="sb" data-d="-1">−</button>
          <input class="val" type="number" inputmode="numeric">
          <button class="sb" data-d="1">+</button>
        </div>
      </div>
    </div>
    <div class="grp stock">${stockBtns}</div>`;
  rowsEl.appendChild(card);

  const prodGrp = card.querySelector(".grp.prod");
  const stockGrp = card.querySelector(".grp.stock");
  refs[r.key] = {prod: prodGrp.querySelector(".val"), stock: stockGrp.querySelector(".val")};

  bindStepper(prodGrp, r.key, "prod");
  bindStepper(stockGrp, r.key, "stock");

  if(r.convert){
    const cb = card.querySelector(".conv");
    refs[r.key].conv = cb;
    cb.addEventListener("click", () => {
      if(state.res[r.key].stock >= r.convert.cost){
        state.res[r.key].stock -= r.convert.cost;
        state.tr += 1;
        update(); save();
        toast(`${r.icon} ${r.convert.cost} → +1 TR`);
      }
    });
  }
});

function bindStepper(grp, key, field){
  grp.querySelectorAll(".sb").forEach(btn => {
    const delta = parseInt(btn.dataset.d, 10);
    const fn = () => adjust(key, field, delta);
    if(Math.abs(delta) === 1) holdRepeat(btn, fn);   // hold to ramp ±1
    else btn.addEventListener("click", fn);          // ±5/±10 single tap
  });
  grp.querySelector(".val").addEventListener("change", e => {
    state.res[key][field] = clampVal(key, field, parseInt(e.target.value, 10));
    update(); save();
  });
}

// TR controls
const trVal = document.getElementById("trVal");
trVal.addEventListener("change", () => {
  state.tr = Math.max(0, Math.round(parseInt(trVal.value,10) || 0)); update(); save();
});
document.querySelectorAll("[data-tr]").forEach(btn => {
  const d = parseInt(btn.dataset.tr, 10);
  holdRepeat(btn, () => { state.tr = Math.max(0, state.tr + d); update(); save(); });
});

// hold-to-repeat
function holdRepeat(btn, fn){
  let to, iv;
  const stop = () => { clearTimeout(to); clearInterval(iv); to = iv = null; };
  btn.addEventListener("pointerdown", e => {
    e.preventDefault(); fn();
    to = setTimeout(() => { iv = setInterval(fn, 75); }, 420);
  });
  ["pointerup","pointerleave","pointercancel"].forEach(ev => btn.addEventListener(ev, stop));
}

// ---- production phase ----
function mcGain(){ return state.tr + state.res.mc.prod; }
function runProduction(){
  lastSnapshot = JSON.parse(JSON.stringify(state));
  const s = state, gains = {};
  const conv = s.res.energy.stock;            // 1. energy -> heat
  s.res.heat.stock += conv; s.res.energy.stock = 0;
  gains.mc = mcGain();                          // 2. credits
  s.res.mc.stock = Math.max(0, s.res.mc.stock + gains.mc);
  ["steel","titanium","plants","energy","heat"].forEach(k => { // 3. rest
    gains[k] = s.res[k].prod; s.res[k].stock += s.res[k].prod;
  });
  s.gen += 1;
  update(); save();

  const icons = ICONS;
  const parts = [`+${gains.mc} M€`];
  if(conv > 0) parts.push(`${conv}⚡→🔥`);
  ["steel","titanium","plants","energy","heat"].forEach(k => { if(gains[k] > 0) parts.push(`+${gains[k]}${icons[k]}`); });
  toast("Поколение " + s.gen + " · " + parts.join(" · "));
  document.getElementById("undoBtn").hidden = false;
}
function undoProduction(){
  if(!lastSnapshot) return;
  state = lastSnapshot; lastSnapshot = null;
  document.getElementById("undoBtn").hidden = true;
  update(); save(); toast("Производство отменено");
}
document.getElementById("produceBtn").addEventListener("click", runProduction);
document.getElementById("undoBtn").addEventListener("click", undoProduction);

// ---- menu ----
const sheet = document.getElementById("sheet");
document.getElementById("menuBtn").addEventListener("click", () => sheet.classList.add("show"));
document.getElementById("closeSheet").addEventListener("click", () => sheet.classList.remove("show"));
sheet.addEventListener("click", e => { if(e.target === sheet) sheet.classList.remove("show"); });
document.getElementById("newGameBtn").addEventListener("click", () => {
  if(confirm("Сбросить и начать новую игру?")){
    state = defaultState(); lastSnapshot = null;
    document.getElementById("undoBtn").hidden = true;
    update(); save(); sheet.classList.remove("show");
  }
});
document.getElementById("prodSummaryBtn").addEventListener("click", () => {
  const r = state.res, icons = ICONS;
  const lines = [`💰 +${mcGain()} M€  (TR ${state.tr} + произв. ${r.mc.prod})`];
  if(r.energy.stock > 0) lines.push(`🔥 +${r.energy.stock} (вся энергия → тепло)`);
  ["steel","titanium","plants","energy","heat"].forEach(k => { if(r[k].prod > 0) lines.push(`${icons[k]} +${r[k].prod}`); });
  alert("Следующее производство начислит:\n\n" + lines.join("\n"));
});

// ---- toast ----
let toastTimer;
function toast(msg){
  const t = document.getElementById("toast");
  t.textContent = msg; t.classList.add("show");
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove("show"), 2600);
}

// ---- render ----
function update(){
  trVal.value = state.tr;
  document.getElementById("gen").textContent = state.gen;
  RES.forEach(r => {
    const rs = state.res[r.key];
    refs[r.key].prod.value = rs.prod;
    refs[r.key].stock.value = rs.stock;
    if(r.convert) refs[r.key].conv.disabled = rs.stock < r.convert.cost;
  });
  document.getElementById("prevText").textContent = "+" + mcGain() + " M€";
}
update();

// ---- PWA: service worker + silent auto-update (no hard reload needed) ----
if("serviceWorker" in navigator){
  let refreshing = false;
  // Was this page already controlled when it loaded? If so, a controller change
  // means a NEW version activated → reload once. (Skips the harmless first-install claim.)
  const hadController = !!navigator.serviceWorker.controller;
  navigator.serviceWorker.addEventListener("controllerchange", () => {
    if(refreshing || !hadController) return;
    refreshing = true;
    location.reload();
  });
  window.addEventListener("load", () => {
    navigator.serviceWorker.register("sw.js").then(reg => {
      reg.update();   // check for a new version on every launch
      // installed PWAs rarely navigate — re-check whenever the app regains focus
      document.addEventListener("visibilitychange", () => {
        if(document.visibilityState === "visible") reg.update();
      });
    }).catch(() => {});
  });
}
</script>
</body>
</html>
